<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <clipPath id="sq"><rect x="0" y="0" width="1024" height="1024" rx="230" ry="230"/></clipPath>
    
<linearGradient id="g_paper" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#4a4f63"/><stop offset="1" stop-color="#2b2f3d"/></linearGradient>
<linearGradient id="g_indigo" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#5b6bd6"/><stop offset="1" stop-color="#33409b"/></linearGradient>
<linearGradient id="g_dark" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#33384a"/><stop offset="1" stop-color="#1c1f2b"/></linearGradient>
<linearGradient id="g_teal" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#2bb6a8"/><stop offset="1" stop-color="#15776f"/></linearGradient>
<linearGradient id="g_amber" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#f0a531"/><stop offset="1" stop-color="#c4761a"/></linearGradient>
<linearGradient id="g_yellow" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#ffd34d"/><stop offset="1" stop-color="#f2ad14"/></linearGradient>
<linearGradient id="g_violet" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#7a5cd0"/><stop offset="1" stop-color="#4a318f"/></linearGradient>
<linearGradient id="g_card" x1="0" y1="0" x2="0" y2="1">
