<linearGradient id="g_cap" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#5a6075"/><stop offset="1" stop-color="#373c4c"/></linearGradient>
<linearGradient id="g_capdark" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="#2e3340"/><stop offset="1" stop-color="#1a1d26"/></linearGradient>
<linearGradient id="g_sheen" x1="0" y1="0" x2="0" y2="1">
  <stop offset="0" stop-color="white" stop-opacity="0.10"/>
  <stop offset="0.55" stop-color="white" stop-opacity="0"/></linearGradient>
<radialGradient id="g_glow" cx="0.5" cy="0.42" r="0.6">
  <stop offset="0" stop-color="#fff4cf" stop-opacity="0.95"/>
  <stop offset="0.5" stop-color="#ffd97a" stop-opacity="0.25"/>
  <stop offset="1" stop-color="#ffd97a" stop-opacity="0"/></radialGradient>
<filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
  <feDropShadow dx="0" dy="18" stdDeviation="26" flood-color="#000" flood-opacity="0.30"/></filter>
<filter id="shs" x="-30%" y="-30%" width="160%" height="160%">
  <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000" flood-opacity="0.28"/></filter>

  </defs>
  <g clip-path="url(#sq)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#g_yellow)"/>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#g_sheen)"/>
    <g transform="rotate(-12 345 610)" filter="url(#shs)">
      <rect x="189" y="454" width="312" height="312" rx="69" fill="url(#g_cap)"/>
      <rect x="226" y="484" width="237" height="230"
            rx="50" fill="white" opacity="0.10"/>
      <text x="345" y="610" font-family="Helvetica, Arial, sans-serif" font-weight="600"
            font-size="162" fill="#eef1f8" text-anchor="middle" dominant-baseline="central">&#8963;</text>
    </g><g transform="rotate(0 560 455)" filter="url(#shs)">
      <rect x="404" y="299" width="312" height="312" rx="69" fill="url(#g_cap)"/>
      <rect x="441" y="329" width="237" height="230"
            rx="50" fill="white" opacity="0.10"/>
      <text x="560" y="455" font-family="Helvetica, Arial, sans-serif" font-weight="600"
            font-size="162" fill="#eef1f8" text-anchor="middle" dominant-baseline="central">&#8997;</text>
    </g><g transform="rotate(12 775 610)" filter="url(#shs)">
      <rect x="619" y="454" width="312" height="312" rx="69" fill="url(#g_cap)"/>
      <rect x="656" y="484" width="237" height="230"
            rx="50" fill="white" opacity="0.10"/>
      <text x="775" y="610" font-family="Helvetica, Arial, sans-serif" font-weight="600"
            font-size="156" fill="#eef1f8" text-anchor="middle" dominant-baseline="central">T</text>
    </g>
  </g>
  <rect x="2" y="2" width="1020" height="1020" rx="228" ry="228"
        fill="none" stroke="white" stroke-opacity="0.10" stroke-width="3"/>
</svg>